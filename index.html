<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ramalepe Brickyard System</title>
</head>

<body style="font-family: Arial, sans-serif; margin:40px;">

    <!-- COMPANY HEADER -->
    <h1 style="text-align:center; font-weight:900;">
        RAMALEPE BRICKYARD
    </h1>

    <p style="text-align:center;">
        1594 Lephepane, Tzaneen, 0850<br>
        Phone: 072 550 0640
    </p>

    <hr>

    <!-- MODE BUTTONS -->
    <div style="text-align:center; margin-bottom:20px;">
        <button onclick="setMode('invoice')">Invoice</button>
        <button onclick="setMode('quotation')">Quotation</button>
    </div>

    <h2 id="documentType">Invoice</h2>

    <!-- CLIENT -->
    <label>Client Name:</label><br>
    <input type="text" id="clientName" placeholder="Enter client name"><br><br>

    <!-- DELIVERY -->
    <label>Delivery Type:</label><br>
    <select id="deliveryType">
        <option value="local">Local Delivery</option>
        <option value="distant">Distant Delivery (+R100 on Sand/Stone)</option>
    </select>

    <hr>

    <h3>Bricks</h3>

    <label>RDP Bricks (R3.50 each)</label><br>
    <input type="number" id="rdp" min="0" placeholder="Enter quantity"><br><br>

    <label>Paving Bricks (R1.90 each)</label><br>
    <input type="number" id="paving" min="0" placeholder="Enter quantity"><br><br>

    <label>ForeHalves Bricks (R1.80 each)</label><br>
    <input type="number" id="forehalves" min="0" placeholder="Enter quantity"><br><br>

    <label>Blocks (R5.50 each)</label><br>
    <input type="number" id="blocks" min="0" placeholder="Enter quantity"><br><br>

    <hr>

    <h3>Sand & Stones</h3>

    <label>River Sand - Full Load (R900)</label><br>
    <input type="number" id="riverFull" min="0" placeholder="Enter quantity"><br><br>

    <label>River Sand - Half Load (R500)</label><br>
    <input type="number" id="riverHalf" min="0" placeholder="Enter quantity"><br><br>

    <label>Concrete Sand - Full Load (R900)</label><br>
    <input type="number" id="concreteFull" min="0" placeholder="Enter quantity"><br><br>

    <label>Concrete Sand - Half Load (R500)</label><br>
    <input type="number" id="concreteHalf" min="0" placeholder="Enter quantity"><br><br>

    <label>Bou Sand - Full Load (R700)</label><br>
    <input type="number" id="bouFull" min="0" placeholder="Enter quantity"><br><br>

    <label>Bou Sand - Half Load (R500)</label><br>
    <input type="number" id="bouHalf" min="0" placeholder="Enter quantity"><br><br>

    <label>River Stones - Full Load (R900)</label><br>
    <input type="number" id="stonesFull" min="0" placeholder="Enter quantity"><br><br>

    <label>River Stones - Half Load (R500)</label><br>
    <input type="number" id="stonesHalf" min="0" placeholder="Enter quantity"><br><br>

    <button onclick="generatePDF()">Generate & Share Document</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
