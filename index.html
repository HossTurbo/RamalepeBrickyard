<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ramalepe Brickyard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="company-name">RAMALEPE BRICKYARD</h1>

    <div class="buttons">
        <button onclick="setMode('invoice')">Invoice</button>
        <button onclick="setMode('quotation')">Quotation</button>
    </div>

    <div class="form">

        <h2 id="documentType">Invoice</h2>

        <label>Client Name</label>
        <input type="text" id="clientName" placeholder="Enter client name">

        <label>Delivery Type</label>
        <select id="deliveryType">
            <option value="local">Local Delivery</option>
            <option value="distant">Distant Delivery (+R100 on Sand/Stone)</option>
        </select>

        <h3>Bricks</h3>

        <label>RDP Bricks (R3.50 each)</label>
        <input type="number" id="rdp" placeholder="Enter quantity">

        <label>Paving Bricks (R1.90 each)</label>
        <input type="number" id="paving" placeholder="Enter quantity">

        <label>ForeHalves Bricks (R1.80 each)</label>
        <input type="number" id="forehalves" placeholder="Enter quantity">

        <label>Blocks (R5.50 each)</label>
        <input type="number" id="blocks" placeholder="Enter quantity">

        <h3>Sand & Stones</h3>

        <label>River Sand - Full Load (R900)</label>
        <input type="number" id="riverFull" placeholder="Enter quantity">

        <label>River Sand - Half Load (R500)</label>
        <input type="number" id="riverHalf" placeholder="Enter quantity">

        <label>Concrete Sand - Full Load (R900)</label>
        <input type="number" id="concreteFull" placeholder="Enter quantity">

        <label>Concrete Sand - Half Load (R500)</label>
        <input type="number" id="concreteHalf" placeholder="Enter quantity">

        <label>Bou Sand - Full Load (R700)</label>
        <input type="number" id="bouFull" placeholder="Enter quantity">

        <label>Bou Sand - Half Load (R500)</label>
        <input type="number" id="bouHalf" placeholder="Enter quantity">

        <label>River Stones - Full Load (R900)</label>
        <input type="number" id="stonesFull" placeholder="Enter quantity">

        <label>River Stones - Half Load (R500)</label>
        <input type="number" id="stonesHalf" placeholder="Enter quantity">

        <button onclick="generatePDF()">Generate Document</button>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
